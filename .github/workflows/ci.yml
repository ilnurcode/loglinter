name: CI/CD  
  
on:  
  push:  
    branches: [main, master]  
  pull_request:  
    branches: [main, master]  
  
jobs:  
  test:  
    runs-on: ubuntu-latest  
    steps:  
      - uses: actions/checkout@v4  
      - uses: actions/setup-go@v5  
        with:  
          go-version: 1.22  
      - run: go mod download  
      - run: go test -v -race ./...  
  
  build:  
    runs-on: ubuntu-latest  
    needs: test  
    steps:  
      - uses: actions/checkout@v4  
      - uses: actions/setup-go@v5  
        with:  
          go-version: 1.22  
      - run: go build -v ./...  
  
  lint:  
    runs-on: ubuntu-latest  
    steps:  
      - uses: actions/checkout@v4  
      - uses: actions/setup-go@v5  
        with:  
          go-version: 1.22  
      - run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest  
      - run: golangci-lint run ./... 
